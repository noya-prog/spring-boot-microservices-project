spring.application.name=api-gateway
server.port=3000
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.urls[0].name=Product Service
springdoc.swagger-ui.urls[0].url=/aggregate/product-service/api-docs
springdoc.swagger-ui.urls[1].name=Order Service
springdoc.swagger-ui.urls[1].url=/aggregate/order-service/api-docs
springdoc.swagger-ui.urls[2].name=Inventory Service
springdoc.swagger-ui.urls[2].url=/aggregate/inventory-service/api-docs

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true


# ===============================
# RESILIENCE4J - CIRCUIT BREAKER INSTANCE
# ===============================
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5

# INSTANCES
resilience4j.circuitbreaker.instances.productServiceCircuitBreaker.base-config=default
resilience4j.circuitbreaker.instances.orderServiceCircuitBreaker.base-config=default
resilience4j.circuitbreaker.instances.inventoryServiceCircuitBreaker.base-config=default

# ===============================
# RESILIENCE4J - TIME LIMITER
# ===============================
resilience4j.timelimiter.configs.default.timeout-duration=3s


# ===============================
# RESILIENCE4J - RETRY
# ===============================
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=3s
